services:
  - type: web
    name: fushidhalanka
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        value: admin123
      - key: DATABASE_URL
        fromDatabase:
          name: fushidhalanka-db
          property: connectionString
    disk:
      name: uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 1

databases:
  - name: fushidhalanka-db
    plan: free
    ipAllowList: []

